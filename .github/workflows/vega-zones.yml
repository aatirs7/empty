name: Vega Zones

# Pre-market zone research: researches the latest scan's valid zone setups with
# the zone_setup fed to the Brain as the highest-weight signal. No-op when the
# last scan produced no valid setups.
#
# SCHEDULE REMOVED 2026-07-15: display-only spend (~$1/run) whose proposals are
# invisible in the profile-tabbed UI (persisted with profileId null), and the
# giant web-search call had been timing out (>10 min SDK limit) 5 of the last 7
# runs — billed with nothing persisted. Manual dispatch still works; to revive
# it properly, stream the research call and give its output a UI surface first.
on:
  workflow_dispatch: {}

jobs:
  zones:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run vega:zones
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          TRADING_MODE: paper
          RESEARCH_MODEL: ${{ vars.RESEARCH_MODEL }}
          MAX_WEB_SEARCHES: ${{ vars.MAX_WEB_SEARCHES }}
