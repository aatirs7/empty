name: Vega Manage

# Goal-driven auto-management of open paper positions. Runs every 30 minutes
# during US market hours. No-op unless auto-manage is enabled in Settings.
on:
  schedule:
    - cron: "*/30 13-20 * * 1-5" # ~every 30 min, 13:00-20:59 UTC on weekdays (covers 9:30-16:00 ET across DST)
  workflow_dispatch: {}

jobs:
  manage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install --no-audit --no-fund
      - run: npm run manage
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ALPACA_API_KEY_ID: ${{ secrets.ALPACA_API_KEY_ID }}
          ALPACA_API_SECRET_KEY: ${{ secrets.ALPACA_API_SECRET_KEY }}
          TRADING_MODE: paper
